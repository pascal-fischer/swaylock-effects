name: CI
on:
  push:
    paths-ignore:
      - '**.md'
      - '**.scd'
      - '**.xml'
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.scd'
      - '**.xml'

jobs:
  build-alpine:
    name: Build on Alpine ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - x86_64
          - aarch64
          - armv7
          - ppc64le
          - riscv64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install latest Alpine Linux for ${{ matrix.arch }}
        uses: jirutka/setup-alpine@v1
        with:
          arch: ${{ matrix.arch }}
          branch: ${{ matrix.arch == 'riscv64' && 'edge' || 'latest-stable' }}
          packages: >
            build-base
            cairo-dev
            libxkbcommon-dev
            linux-pam-dev
            meson
            scdoc
            wayland-dev
            wayland-protocols

      - name: Build
        run: |
          meson setup -Dgdk-pixbuf=disabled . output
          meson compile -C output --verbose
        shell: alpine.sh {0}

  build-fedora:
    name: Build on Fedora
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            gcc \
            cairo-devel \
            libxkbcommon-devel \
            pam-devel \
            meson \
            scdoc \
            wayland-devel \
            wayland-protocols-devel \
            gdk-pixbuf2-devel

      - name: Build
        run: |
          meson setup . output
          meson compile -C output --verbose

  build-freebsd:
    name: Build on FreeBSD
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y \
              cairo \
              libxkbcommon \
              meson \
              pkgconf \
              scdoc \
              wayland \
              wayland-protocols \
              gdk-pixbuf2
          run: |
            meson setup . output
            meson compile -C output --verbose
